<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — Pragya Pravah</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'IBM Plex Sans', sans-serif;
    background: #faf8f5;
    color: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 1.5rem;
  }
  .card {
    max-width: 24rem;
    text-align: center;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 1rem;
    padding: 2.5rem 2rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .icon { width: 3rem; height: 3rem; margin: 0 auto 1rem; color: #94a3b8; }
  h1 { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.5rem; }
  p { font-size: 0.875rem; color: #64748b; line-height: 1.5; }
  .hi { font-family: 'IBM Plex Sans Devanagari', sans-serif; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #f1f5f9; }
  button {
    margin-top: 1.25rem;
    padding: 0.5rem 1.5rem;
    background: #f97316;
    color: #fff;
    border: none;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #ea580c; }
</style>
</head>
<body>
<div class="card">
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
  <h1>You're offline</h1>
  <p>Please check your internet connection and try again.</p>
  <p class="hi">आप ऑफ़लाइन हैं। कृपया अपना इंटरनेट कनेक्शन जाँचें और पुनः प्रयास करें।</p>
  <button onclick="window.location.reload()">Retry / पुनः प्रयास</button>
</div>
</body>
</html>
